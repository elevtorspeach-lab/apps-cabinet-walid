name: Verify Integrity

on:
  pull_request:
  push:
    branches:
      - main
      - cabinetlasttttupdat
      - cabinet-araqi-offline-update
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm install

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Sync offline assets
        working-directory: desktop-app
        run: npm run sync:web-assets

      - name: Verify offline asset sync
        working-directory: desktop-app
        run: npm run verify:web-assets

      - name: Check server syntax
        run: node --check server/index.js
