name: Verify Integrity

on:
  pull_request:
  push:
    branches:
      - main
      - cabinetlasttttupdat
      - cabinet-araqi-offline-update
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Verify offline asset sync
        working-directory: desktop-app
        run: npm run verify:web-assets

      - name: Check browser script syntax
        run: node --check app.js

      - name: Check server syntax
        run: node --check server/index.js
